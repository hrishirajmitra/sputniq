services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - control

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - control

  redis:
    image: redis:7-alpine
    container_name: sputniq-redis
    ports:
      - "6379:6379"
    networks:
      - control

  postgres:
    image: postgres:16-alpine
    container_name: sputniq-postgres
    environment:
      POSTGRES_DB: sputniq
      POSTGRES_USER: sputniq
      POSTGRES_PASSWORD: sputniq
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - control

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: sputniq-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - control

  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn sputniq.api.server:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379
      POSTGRES_DSN: postgresql://sputniq:sputniq@postgres:5432/sputniq
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    volumes:
      - ./src:/app/src
      - ./pyproject.toml:/app/pyproject.toml
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - kafka
      - redis
      - postgres
      - jaeger
    networks:
      - control

networks:
  control:
    name: sputniq-control
    driver: bridge

volumes:
  postgres-data:
