services:
  postgres:
    image: postgres:16-alpine
    container_name: sputniq-postgres
    environment:
      POSTGRES_USER: sputniq
      POSTGRES_PASSWORD: sputniq
      POSTGRES_DB: sputniq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sputniq"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    command: bash -c "mkdir -p /root/.ssh && cp -r /tmp/ssh-keys/* /root/.ssh/ && chown -R root:root /root/.ssh && chmod 600 /root/.ssh/* && uvicorn sputniq.api.server:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./pyproject.toml:/app/pyproject.toml
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infrastructure/.ssh-nodes:/tmp/ssh-keys
    environment:
      DATABASE_URL: postgresql://sputniq:sputniq@postgres:5432/sputniq
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

networks:
  default:
    name: sputniq-network
    external: true

volumes:
  pgdata:
