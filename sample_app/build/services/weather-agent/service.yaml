version: "3.9"

services:
  weather-agent:
    build: .
    image: weather/weather-agent:1.0.0
    restart: unless-stopped
    environment:
      - SERVICE_ID=weather-agent
      - SERVICE_TYPE=agent
      - RUNTIME=docker-compose

      - OPENAI_API_KEY=${OPENAI_API_KEY}

    networks:
      - agentos-net

networks:
  agentos-net:
    external: true
